
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veroe Central Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030305;
            --card-bg: rgba(20, 20, 25, 0.6);
            --primary: #00f5ff;
            --secondary: #7000ff;
            --success: #00ff88;
            --error: #ff3e3e;
            --warning: #ffb800;
            --text: #e1e1e6;
            --text-dim: #a1a1aa;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #0e0e1a, #030305),
                        radial-gradient(circle at bottom left, #1a0b2e, #030305);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            padding: 3rem 2rem;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(10, 10, 15, 0.4);
            backdrop-filter: blur(20px);
            margin-bottom: 3rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.5rem, 5vw, 3rem);
            letter-spacing: 0.5rem;
            margin: 0;
            background: linear-gradient(90deg, #fff, var(--primary), var(--secondary), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 245, 255, 0.2);
            animation: shine 5s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .container {
            width: 95%;
            max-width: 1400px;
            padding-bottom: 6rem;
        }

        .global-summary {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .summary-item {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 2rem;
            border: 1px solid var(--glass-border);
            text-align: center;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .summary-item:hover {
            transform: scale(1.02);
            border-color: var(--primary);
        }

        .summary-value {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 4vw, 3.5rem);
            color: #fff;
            display: block;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .summary-label {
            color: var(--primary);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 3px;
            font-weight: 600;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            padding: 2rem;
            backdrop-filter: blur(15px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 20px rgba(0, 245, 255, 0.05);
            border-color: rgba(0, 245, 255, 0.4);
        }

        .card:hover::before { opacity: 1; }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .db-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.25rem;
            color: #fff;
            letter-spacing: 1px;
        }

        .status-badge {
            font-size: 0.7rem;
            font-weight: 800;
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-online { background: rgba(0, 255, 136, 0.1); color: var(--success); border: 1px solid rgba(0, 255, 136, 0.2); }
        .status-online::before { background: var(--success); box-shadow: 0 0 10px var(--success); }

        .status-offline { background: rgba(255, 62, 62, 0.1); color: var(--error); border: 1px solid rgba(255, 62, 62, 0.2); }
        .status-offline::before { background: var(--error); }

        .status-sync { background: rgba(255, 184, 0, 0.1); color: var(--warning); border: 1px solid rgba(255, 184, 0, 0.2); }
        .status-sync::before { background: var(--warning); }

        .metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .metric {
            background: var(--glass);
            padding: 1.5rem;
            border-radius: 1.5rem;
            display: flex;
            flex-direction: column;
            border: 1px solid transparent;
            transition: border-color 0.3s;
        }

        .metric:hover { border-color: rgba(255, 255, 255, 0.05); }

        .metric-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        .metric-value {
            font-size: 1.75rem;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            color: #fff;
        }

        .latency { grid-column: span 2; display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; margin-top: 0.5rem; }
        
        .last-visit {
            grid-column: span 2;
            margin-top: 1rem;
            font-size: 0.8rem;
            color: var(--text-dim);
            padding-top: 1.5rem;
            border-top: 1px solid var(--glass-border);
        }

        .refresh-bar {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: rgba(10, 10, 15, 0.8);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 0.75rem 1.5rem;
            border-radius: 3rem;
            font-weight: 600;
            font-size: 0.8rem;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .refresh-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.4; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>VEROIX ANALYTICS CENTRAL</h1>
    </div>

    <div class="container">
        <div class="global-summary">
            <div class="summary-item">
                <span class="summary-value" id="global-total">-</span>
                <span class="summary-label">Total Reach</span>
            </div>
            <div class="summary-item">
                <span class="summary-value" id="global-blocked">-</span>
                <span class="summary-label">Shielded Hits</span>
            </div>
            <div class="summary-item">
                <span class="summary-value" id="global-active">-</span>
                <span class="summary-label">Active Nodes</span>
            </div>
        </div>

        <div class="stats-grid" id="stats-grid">
            <!-- Cards will be injected here -->
        </div>
    </div>

    <div class="refresh-bar" id="refresh-indicator">
        <div class="refresh-dot"></div>
        LIVE SYNC ACTIVE
    </div>

    <script>
        async function fetchData() {
            try {
                const res = await fetch("/api/stats");
                const data = await res.json();
                renderCards(data);
                updateSummary(data);
            } catch (e) {
                console.error("Fetch error:", e);
            }
        }

        function updateSummary(data) {
            const total = data.reduce((acc, curr) => acc + (curr.totalVisits || 0), 0);
            const blocked = data.reduce((acc, curr) => acc + (curr.blockedVisits || 0), 0);
            const active = data.filter(d => d.status === "Online" || d.status === "Connected" || d.status.startsWith("Synchronized")).length;

            document.getElementById("global-total").textContent = total.toLocaleString();
            document.getElementById("global-blocked").textContent = blocked.toLocaleString();
            document.getElementById("global-active").textContent = active + "/" + data.length;
        }

        function renderCards(data) {
            const grid = document.getElementById("stats-grid");
            grid.innerHTML = data.map(db => {
                const lastSeen = db.lastVisit ? new Date(db.lastVisit).toLocaleString() : 'No Recent Activity';
                let statusClass = 'status-offline';
                if (db.status === 'Online' || db.status === 'Connected') statusClass = 'status-online';
                else if (db.status.startsWith('Synchronized')) statusClass = 'status-sync';

                return `
                    <div class="card">
                        <div class="card-header">
                            <span class="db-name">${db.name}</span>
                            <span class="status-badge ${statusClass}">${db.status}</span>
                        </div>
                        <div class="metrics">
                            <div class="metric">
                                <span class="metric-label">Total Reach</span>
                                <span class="metric-value">${(db.totalVisits || 0).toLocaleString()}</span>
                            </div>
                            <div class="metric">
                                <span class="metric-label">Shielded</span>
                                <span class="metric-value" style="color: ${db.blockedVisits > 0 ? 'var(--error)' : 'var(--success)'}">${(db.blockedVisits || 0).toLocaleString()}</span>
                            </div>
                            <div class="metric latency">
                                <span class="metric-label">Node Latency</span>
                                <span class="metric-value" style="font-size: 1.1rem; color: var(--primary)">${db.latency || 'Pending...'}</span>
                            </div>
                        </div>
                        <div class="last-visit">
                            Last Signal: <span style="color: #fff; font-weight: 500;">${lastSeen}</span>
                        </div>
                    </div>
                `;
            }).join("");
        }

        fetchData();
        setInterval(fetchData, 10000);
    </script>
</body>
</html>
